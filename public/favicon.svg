<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PIA favicon: initial "p" + the live block cursor, in green phosphor.
       Terminal-idiom first; the rounded tile is a deliberate web concession so
       the mark keeps a clear silhouette against any browser-tab background. -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#0b0f0a" stroke="#1c2a1a" stroke-width="1.5"/>
  <text x="17" y="45" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="42" font-weight="700" fill="#c9e8c2" text-anchor="middle">p</text>
  <rect x="34" y="20" width="13" height="26" rx="2" fill="#7cf27c"/>
</svg>
